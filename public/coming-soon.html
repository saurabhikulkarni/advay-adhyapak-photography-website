<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advay Adhyapak Photography | Coming Soon</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
  
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --bg-dark: #0a0a0a;
      --text-primary: #ffffff;
      --text-secondary: #a0a0a0;
      --accent: #d4af37; /* Premium Gold */
      --glass-bg: rgba(15, 15, 15, 0.45);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-blur: blur(25px);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow-x: hidden;
      position: relative;
      padding: 2rem 1rem;
    }

    /* Fixed Fullscreen Background Image with Dark Overlay */
    .bg-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: linear-gradient(135deg, rgba(10, 10, 10, 0.9) 0%, rgba(10, 10, 10, 0.65) 50%, rgba(10, 10, 10, 0.95) 100%), url('images/bg1.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      z-index: -1;
    }

    /* Glass Card Container */
    .container {
      max-width: 550px;
      width: 100%;
      padding: 3rem 2.5rem;
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      animation: fadeInUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* Logo Styling */
    .logo-wrapper {
      margin-bottom: 2rem;
      display: inline-block;
    }

    .logo-img {
      height: 80px;
      max-width: 100%;
      object-fit: contain;
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.4));
    }

    /* Header Typography */
    .tagline {
      font-family: 'Syncopate', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.35em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 0.8rem;
    }

    .title {
      font-family: 'Syncopate', sans-serif;
      font-size: 1.45rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      line-height: 1.4;
      margin-bottom: 1.2rem;
      text-transform: uppercase;
      color: var(--text-primary);
    }

    .description {
      font-size: 0.85rem;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 2.2rem;
      font-weight: 300;
    }

    /* Contact Form inside glass card */
    .inquiry-form-container {
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      padding-top: 2rem;
      text-align: left;
    }

    .form-title {
      font-family: 'Syncopate', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      margin-bottom: 1.2rem;
      text-transform: uppercase;
      color: var(--text-primary);
      text-align: center;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-group label {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-secondary);
      display: block;
      margin-bottom: 0.4rem;
    }

    .form-control {
      width: 100%;
      padding: 0.75rem 1rem;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: var(--text-primary);
      font-family: 'Montserrat', sans-serif;
      font-size: 0.8rem;
      transition: all 0.3s ease;
    }

    .form-control::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    .form-control:focus {
      outline: none;
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.15);
    }

    textarea.form-control {
      resize: none;
    }

    .btn-submit {
      width: 100%;
      padding: 0.85rem 1.5rem;
      background: var(--text-primary);
      color: var(--bg-dark);
      border: none;
      border-radius: 8px;
      font-family: 'Syncopate', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      margin-top: 0.5rem;
    }

    .btn-submit:hover {
      background: var(--accent);
      color: var(--text-primary);
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(212, 175, 55, 0.25);
    }

    .btn-submit:active {
      transform: translateY(0);
    }

    .btn-submit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* Social Icons */
    .socials {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin-top: 2rem;
    }

    .social-icon {
      color: var(--text-secondary);
      font-size: 1.05rem;
      transition: all 0.3s ease;
      text-decoration: none;
      width: 35px;
      height: 35px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.02);
    }

    .social-icon:hover {
      color: var(--accent);
      border-color: var(--accent);
      background: rgba(212, 175, 55, 0.05);
      transform: translateY(-3px);
    }

    /* Toast Notification Container */
    #toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
      max-width: 320px;
    }

    .toast {
      background: rgba(15, 15, 15, 0.9);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--text-primary);
      padding: 1rem 1.25rem;
      border-radius: 8px;
      margin-bottom: 10px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      gap: 0.8rem;
      font-size: 0.8rem;
      animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .toast.success {
      border-left: 4px solid #4caf50;
    }

    .toast.error {
      border-left: 4px solid #f44336;
    }

    /* Animations */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    @keyframes slideOut {
      from {
        transform: translateX(0);
        opacity: 1;
      }
      to {
        transform: translateX(100%);
        opacity: 0;
      }
    }

    @media (max-width: 480px) {
      .container {
        padding: 2rem 1.5rem;
      }
      .title {
        font-size: 1.2rem;
      }
      .logo-img {
        height: 65px;
      }
    }
  </style>
</head>
<body>

  <!-- Fullscreen Fixed Background Overlay -->
  <div class="bg-overlay"></div>

  <!-- Toast Notification Container -->
  <div id="toast-container"></div>

  <!-- Content Glass Card -->
  <main class="container">
    
    <!-- Logo Variant -->
    <a href="index.html" class="logo-wrapper" title="Preview Live Site">
      <img src="images/logo_light.png" alt="Advay Adhyapak Photography" class="logo-img">
    </a>

    <div class="tagline">Fine-Art Photography</div>
    <h1 class="title">Crafting Stories.<br>Launching Soon.</h1>
    <p class="description">
      We are curating a premium visual experience showcasing our portfolio of fine-art weddings, pre-weddings, editorial portraits, and events in Nashik.
    </p>

    <!-- Inquiry Form -->
    <div class="inquiry-form-container">
      <h2 class="form-title">Send a Booking Inquiry</h2>
      <form id="coming-soon-form">
        <div class="form-group">
          <label for="name">Your Name *</label>
          <input type="text" id="name" name="name" class="form-control" placeholder="Jane Doe" required>
        </div>

        <div class="form-group">
          <label for="email">Email Address *</label>
          <input type="email" id="email" name="email" class="form-control" placeholder="jane@domain.com" required>
        </div>

        <div class="form-group">
          <label for="message">Requirements / Message *</label>
          <textarea id="message" name="message" class="form-control" rows="4" placeholder="Tell us about your event date, type, and location details..." required></textarea>
        </div>

        <button type="submit" id="submit-btn" class="btn-submit">Submit Inquiry</button>
      </form>
    </div>

    <!-- Social Links -->
    <div class="socials">
      <a href="https://instagram.com" target="_blank" rel="noopener" class="social-icon" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
      <a href="https://facebook.com" target="_blank" rel="noopener" class="social-icon" aria-label="Facebook"><i class="fa-brands fa-facebook-f"></i></a>
      <a href="https://youtube.com" target="_blank" rel="noopener" class="social-icon" aria-label="YouTube"><i class="fa-brands fa-youtube"></i></a>
      <a href="https://pinterest.com" target="_blank" rel="noopener" class="social-icon" aria-label="Pinterest"><i class="fa-brands fa-pinterest-p"></i></a>
    </div>

  </main>

  <!-- Form Submission JavaScript -->
  <script>
    const form = document.getElementById('coming-soon-form');
    const submitBtn = document.getElementById('submit-btn');
    const toastContainer = document.getElementById('toast-container');

    function showToast(message, type = 'success') {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.innerHTML = `
        <i class="${type === 'success' ? 'fa-solid fa-circle-check' : 'fa-solid fa-circle-exclamation'}" style="color: ${type === 'success' ? '#4caf50' : '#f44336'}"></i>
        <span>${message}</span>
      `;
      toastContainer.appendChild(toast);
      
      // Auto-remove toast
      setTimeout(() => {
        toast.style.animation = 'slideOut 0.3s ease forwards';
        setTimeout(() => toast.remove(), 300);
      }, 4000);
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      submitBtn.disabled = true;
      const originalText = submitBtn.textContent;
      submitBtn.textContent = 'Sending...';

      const formData = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        message: document.getElementById('message').value,
        subject: 'Coming Soon Inquiry'
      };

      try {
        const response = await fetch('/api/contact', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(formData)
        });
        
        const data = await response.json();
        
        if (response.ok && data.success) {
          showToast('Thank you for reaching out! We have received your inquiry.', 'success');
          form.reset();
        } else {
          showToast(data.message || 'Something went wrong. Please try again.', 'error');
        }
      } catch (err) {
        showToast('Connection error. Please check your network.', 'error');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = originalText;
      }
    });
  </script>
</body>
</html>
